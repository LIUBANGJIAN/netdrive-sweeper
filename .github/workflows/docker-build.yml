name: Docker Build and Push

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image without cache
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:latest \
            .

      - name: Verify image startup
        run: |
          docker run --rm ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:${{ github.sha }} \
            /app/netdrive-sweeper -h >/dev/null 2>&1 || true

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:latest
