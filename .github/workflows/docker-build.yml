name: Docker Build and Push

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image without cache
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:latest \
            .

      - name: Verify image contents
        run: |
          docker run --rm --entrypoint /bin/sh ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:${{ github.sha }} \
            -c 'test -x /app/netdrive-sweeper && test -f /app/cd2.proto && echo "image contents ok"'

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/netdrive-sweeper:latest
